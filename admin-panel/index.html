<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - Chatops Commander</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(to bottom right, #0f172a, #1a2942);
      color: #fff;
      min-height: 100vh;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }
    
    .login-page {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    
    .login-box {
      background: #1e293b;
      padding: 2rem;
      border-radius: 0.5rem;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.25);
      width: 100%;
      max-width: 400px;
    }
    
    .login-box h1 {
      font-size: 1.875rem;
      font-weight: bold;
      margin-bottom: 2rem;
      text-align: center;
    }
    
    .form-group {
      margin-bottom: 1rem;
    }
    
    .form-group input {
      width: 100%;
      padding: 0.5rem 1rem;
      background: #334155;
      border: 1px solid #475569;
      border-radius: 0.25rem;
      color: #fff;
      font-size: 1rem;
    }
    
    .form-group input::placeholder {
      color: #94a3b8;
    }
    
    .form-group button {
      width: 100%;
      padding: 0.5rem 1rem;
      background: #2563eb;
      border: none;
      border-radius: 0.25rem;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
      font-size: 1rem;
    }
    
    .form-group button:hover {
      background: #1d4ed8;
    }
    
    .error {
      color: #ef4444;
      font-size: 0.875rem;
      margin-top: 0.5rem;
      display: none;
    }
    
    .dashboard {
      display: none;
    }
    
    .navbar {
      background: #334155;
      border-bottom: 1px solid #475569;
      padding: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      border-radius: 0.5rem;
    }
    
    .navbar h1 {
      font-size: 1.5rem;
    }
    
    .navbar button {
      background: #dc2626;
      border: none;
      color: #fff;
      padding: 0.5rem 1rem;
      border-radius: 0.25rem;
      cursor: pointer;
      font-weight: bold;
    }
    
    .navbar button:hover {
      background: #b91c1c;
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    
    .stat-card {
      background: #334155;
      padding: 1.5rem;
      border-radius: 0.5rem;
    }
    
    .stat-card p:first-child {
      color: #94a3b8;
      font-size: 0.875rem;
      margin-bottom: 0.5rem;
    }
    
    .stat-card p:last-child {
      font-size: 1.875rem;
      font-weight: bold;
    }
    
    .users-section {
      background: #334155;
      padding: 1.5rem;
      border-radius: 0.5rem;
    }
    
    .users-section h2 {
      margin-bottom: 1rem;
      font-size: 1.25rem;
    }
    
    .user-item {
      background: #1e293b;
      padding: 1rem;
      border-radius: 0.25rem;
      margin-bottom: 0.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .user-info p:first-child {
      font-weight: bold;
    }
    
    .user-info p:last-child {
      font-size: 0.875rem;
      color: #94a3b8;
    }
    
    .status {
      font-size: 0.875rem;
      padding: 0.25rem 0.5rem;
      border-radius: 0.25rem;
    }
    
    .status.active {
      color: #4ade80;
    }
    
    .status.inactive {
      color: #f87171;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    const ADMIN_URL = window.location.origin  // Will be http://192.168.136.149:3002
    const BACKEND_URL = 'http://192.168.136.149:3001'
    let token = localStorage.getItem('admin_token')
    let currentUser = JSON.parse(localStorage.getItem('admin_user') || '{}')

    async function fetchAPI(url, options = {}) {
      const headers = {
        'Content-Type': 'application/json',
        ...options.headers
      }
      
      if (token) {
        headers['Authorization'] = `Bearer ${token}`
      }

      try {
        const response = await fetch(url, {
          headers,
          ...options
        })
        
        if (!response.ok) {
          const error = await response.json()
          throw new Error(error.message || `HTTP ${response.status}`)
        }
        
        return await response.json()
      } catch (err) {
        console.error('Fetch error:', err)
        throw err
      }
    }

    async function login(email, password) {
      try {
        console.log('🔐 Login attempt:', email)
        const response = await fetchAPI(`${ADMIN_URL}/api/login`, {
          method: 'POST',
          body: JSON.stringify({ email, password })
        })
        
        console.log('Response:', response)
        
        // La réponse a une structure: { success, message, data: { user, token } }
        const { token: newToken, user } = response.data || response
        
        if (!newToken || !user) {
          showError('Réponse de serveur invalide')
          return
        }
        
        // Vérifier que c'est un admin
        if (user.role !== 'admin' && user.role !== 'super_admin') {
          showError(`Accès refusé. Votre rôle est: ${user.role}`)
          return
        }
        
        token = newToken
        currentUser = user
        localStorage.setItem('admin_token', token)
        localStorage.setItem('admin_user', JSON.stringify(currentUser))
        console.log('✅ Login successful:', currentUser)
        render()
      } catch (error) {
        console.error('❌ Login error:', error.message)
        showError(error.message || 'Erreur de connexion')
      }
    }

    function logout() {
      token = null
      currentUser = {}
      localStorage.removeItem('admin_token')
      localStorage.removeItem('admin_user')
      render()
    }

    function showError(message) {
      const errorEl = document.getElementById('error')
      if (errorEl) {
        errorEl.textContent = message
        errorEl.style.display = 'block'
      }
    }

    async function loadStats() {
      try {
        const response = await fetchAPI(`${BACKEND_URL}/api/admin/stats`)
        document.getElementById('totalUsers').textContent = response.totalUsers || 0
        document.getElementById('activeUsers').textContent = response.activeUsers || 0
        document.getElementById('monthlyRevenue').textContent = '€' + (response.monthlyRevenue || 0).toFixed(2)
        document.getElementById('totalServers').textContent = response.totalServers || 0
      } catch (error) {
        console.error('Stats error:', error)
      }
    }

    async function loadUsers() {
      try {
        const response = await fetchAPI(`${BACKEND_URL}/api/admin/users?limit=10`)
        const users = response.users || []
        const html = users.map(u => `
          <div class="user-item">
            <div class="user-info">
              <p>${u.email}</p>
              <p>${u.plan || 'N/A'}</p>
            </div>
            <span class="status ${u.status === 'active' ? 'active' : 'inactive'}">${u.status}</span>
          </div>
        `).join('')
        document.getElementById('usersList').innerHTML = html || '<p style="color: #94a3b8;">Aucun utilisateur</p>'
      } catch (error) {
        console.error('Users error:', error)
      }
    }

    function handleLogin(e) {
      e.preventDefault()
      const email = document.getElementById('email').value
      const password = document.getElementById('password').value
      login(email, password)
    }

    function render() {
      const app = document.getElementById('app')
      
      if (!token) {
        app.innerHTML = `
          <div class="login-page">
            <div class="login-box">
              <h1>🛡️ Admin Panel</h1>
              <form onsubmit="handleLogin(event)">
                <div class="form-group">
                  <input type="email" id="email" placeholder="Email" required>
                </div>
                <div class="form-group">
                  <input type="password" id="password" placeholder="Mot de passe" required>
                </div>
                <div class="form-group">
                  <button type="submit">Connexion</button>
                </div>
                <div id="error" class="error"></div>
              </form>
            </div>
          </div>
        `
      } else {
        app.innerHTML = `
          <div class="dashboard">
            <div class="navbar">
              <h1>🛡️ Admin Panel</h1>
              <div>
                <span style="margin-right: 1rem;">${currentUser.email}</span>
                <button onclick="logout()">Logout</button>
              </div>
            </div>
            
            <div class="container">
              <div class="stats-grid">
                <div class="stat-card">
                  <p>Total Users</p>
                  <p id="totalUsers">-</p>
                </div>
                <div class="stat-card">
                  <p>Active Users</p>
                  <p id="activeUsers">-</p>
                </div>
                <div class="stat-card">
                  <p>Monthly Revenue</p>
                  <p id="monthlyRevenue">-</p>
                </div>
                <div class="stat-card">
                  <p>Total Servers</p>
                  <p id="totalServers">-</p>
                </div>
              </div>
              
              <div class="users-section">
                <h2>Gestion des Utilisateurs</h2>
                <div id="usersList">
                  <p style="color: #94a3b8;">Chargement...</p>
                </div>
              </div>
            </div>
          </div>
        `
        
        setTimeout(() => {
          loadStats()
          loadUsers()
        }, 100)
      }
    }

    render()
  </script>
</body>
</html>
