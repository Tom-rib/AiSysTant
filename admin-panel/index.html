<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - Chatops Commander</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: #0f172a;
      color: #fff;
    }
    
    .min-h-screen {
      min-height: 100vh;
    }
    
    .flex {
      display: flex;
    }
    
    .items-center {
      align-items: center;
    }
    
    .justify-center {
      justify-content: center;
    }
    
    .bg-gradient-to-br {
      background: linear-gradient(to bottom right, #0f172a, #1a2942);
    }
    
    .bg-gray-800 {
      background-color: #1e293b;
    }
    
    .bg-gray-700 {
      background-color: #334155;
    }
    
    .p-8 {
      padding: 2rem;
    }
    
    .p-6 {
      padding: 1.5rem;
    }
    
    .p-4 {
      padding: 1rem;
    }
    
    .rounded-lg {
      border-radius: 0.5rem;
    }
    
    .shadow-2xl {
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    }
    
    .w-96 {
      width: 24rem;
    }
    
    .space-y-4 > * + * {
      margin-top: 1rem;
    }
    
    .space-y-2 > * + * {
      margin-top: 0.5rem;
    }
    
    .w-full {
      width: 100%;
    }
    
    .px-4 {
      padding-left: 1rem;
      padding-right: 1rem;
    }
    
    .py-2 {
      padding-top: 0.5rem;
      padding-bottom: 0.5rem;
    }
    
    .border {
      border: 1px solid #475569;
    }
    
    .rounded {
      border-radius: 0.25rem;
    }
    
    .text-white {
      color: #fff;
    }
    
    .bg-blue-600 {
      background-color: #2563eb;
    }
    
    .bg-blue-600:hover {
      background-color: #1d4ed8;
    }
    
    .font-bold {
      font-weight: bold;
    }
    
    .cursor-pointer {
      cursor: pointer;
    }
    
    .text-red-500 {
      color: #ef4444;
    }
    
    .text-sm {
      font-size: 0.875rem;
    }
    
    .hidden {
      display: none;
    }
    
    .text-3xl {
      font-size: 1.875rem;
    }
    
    .mb-8 {
      margin-bottom: 2rem;
    }
    
    .mb-2 {
      margin-bottom: 0.5rem;
    }
    
    .mb-4 {
      margin-bottom: 1rem;
    }
    
    .text-center {
      text-align: center;
    }
    
    .border-b {
      border-bottom: 1px solid #334155;
    }
    
    .gap-4 {
      gap: 1rem;
    }
    
    .grid {
      display: grid;
    }
    
    .grid-cols-4 {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }
    
    .text-gray-400 {
      color: #94a3b8;
    }
    
    .text-green-400 {
      color: #4ade80;
    }
    
    .text-red-400 {
      color: #f87171;
    }
    
    .bg-red-600 {
      background-color: #dc2626;
    }
    
    .bg-red-600:hover {
      background-color: #b91c1c;
    }
    
    input, button {
      font-size: 1rem;
    }
    
    input {
      border: 1px solid #475569;
      background-color: #334155;
      padding: 0.5rem 1rem;
      border-radius: 0.25rem;
      color: #fff;
    }
    
    input::placeholder {
      color: #94a3b8;
    }
    
    button {
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 0.25rem;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    const API_URL = 'http://192.168.136.149:3002'
    const BACKEND_API = 'http://192.168.136.149:3001/api/admin'
    
    let token = localStorage.getItem('admin_token')
    let currentUser = JSON.parse(localStorage.getItem('admin_user') || '{}')

    async function fetchAPI(url, options = {}) {
      const response = await fetch(url, {
        headers: {
          'Content-Type': 'application/json',
          ...options.headers
        },
        ...options
      })
      
      if (!response.ok) {
        const error = await response.json()
        throw new Error(error.message || `HTTP ${response.status}`)
      }
      
      return response.json()
    }

    async function login(email, password) {
      try {
        console.log('Tentative de connexion:', email)
        const response = await fetchAPI(`${API_URL}/api/login`, {
          method: 'POST',
          body: JSON.stringify({ email, password })
        })
        
        token = response.data.token
        currentUser = response.data.user
        localStorage.setItem('admin_token', token)
        localStorage.setItem('admin_user', JSON.stringify(currentUser))
        console.log('✅ Connexion réussie:', currentUser)
        render()
      } catch (error) {
        console.error('❌ Erreur:', error.message)
        const errorDiv = document.getElementById('error')
        if (errorDiv) {
          errorDiv.textContent = error.message || 'Erreur de connexion'
          errorDiv.classList.remove('hidden')
        }
      }
    }

    function logout() {
      token = null
      currentUser = {}
      localStorage.removeItem('admin_token')
      localStorage.removeItem('admin_user')
      render()
    }

    async function loadStats() {
      try {
        const response = await fetchAPI(`${BACKEND_API}/stats`, {
          headers: { Authorization: `Bearer ${token}` }
        })
        document.getElementById('totalUsers').textContent = response.totalUsers || 0
        document.getElementById('activeUsers').textContent = response.activeUsers || 0
        document.getElementById('monthlyRevenue').textContent = '€' + (response.monthlyRevenue || 0).toFixed(2)
        document.getElementById('totalServers').textContent = response.totalServers || 0
      } catch (error) {
        console.error('Erreur stats:', error)
      }
    }

    async function loadUsers() {
      try {
        const response = await fetchAPI(`${BACKEND_API}/users?limit=10`, {
          headers: { Authorization: `Bearer ${token}` }
        })
        const users = response.users || []
        const html = users.map(u => `
          <div class="bg-gray-700 p-4 rounded flex justify-between items-center">
            <div>
              <p class="font-bold">${u.email}</p>
              <p class="text-sm text-gray-400">${u.plan || 'N/A'}</p>
            </div>
            <span class="text-sm ${u.status === 'active' ? 'text-green-400' : 'text-red-400'}">${u.status}</span>
          </div>
        `).join('')
        document.getElementById('usersList').innerHTML = html || '<p class="text-gray-400">Aucun utilisateur</p>'
      } catch (error) {
        console.error('Erreur users:', error)
      }
    }

    const loginPage = `
      <div class="min-h-screen flex items-center justify-center bg-gradient-to-br">
        <div class="bg-gray-800 p-8 rounded-lg shadow-2xl w-96">
          <h1 class="text-3xl font-bold mb-8 text-center">🛡️ Admin Panel</h1>
          <form onsubmit="handleLogin(event)" class="space-y-4">
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Mot de passe" required>
            <button type="submit" class="w-full bg-blue-600 px-4 py-2 rounded font-bold cursor-pointer">Connexion</button>
            <div id="error" class="text-red-500 text-sm hidden"></div>
          </form>
        </div>
      </div>
    `

    const dashboardPage = `
      <div class="min-h-screen bg-gray-800">
        <nav class="bg-gray-700 border-b p-4 flex justify-between items-center">
          <h1 class="text-2xl font-bold">🛡️ Admin Panel</h1>
          <div class="flex items-center gap-4">
            <span>${currentUser.email}</span>
            <button onclick="logout()" class="bg-red-600 px-4 py-2 rounded cursor-pointer">Logout</button>
          </div>
        </nav>

        <div class="p-8">
          <div class="grid grid-cols-4 gap-4 mb-8">
            <div class="bg-gray-700 p-6 rounded-lg">
              <p class="text-gray-400 mb-2">Total Users</p>
              <p id="totalUsers" class="text-3xl font-bold">-</p>
            </div>
            <div class="bg-gray-700 p-6 rounded-lg">
              <p class="text-gray-400 mb-2">Active Users</p>
              <p id="activeUsers" class="text-3xl font-bold">-</p>
            </div>
            <div class="bg-gray-700 p-6 rounded-lg">
              <p class="text-gray-400 mb-2">Monthly Revenue</p>
              <p id="monthlyRevenue" class="text-3xl font-bold">-</p>
            </div>
            <div class="bg-gray-700 p-6 rounded-lg">
              <p class="text-gray-400 mb-2">Total Servers</p>
              <p id="totalServers" class="text-3xl font-bold">-</p>
            </div>
          </div>

          <div class="bg-gray-700 p-6 rounded-lg">
            <h2 class="text-xl font-bold mb-4">Gestion des Utilisateurs</h2>
            <div id="usersList" class="space-y-2">
              <p class="text-gray-400">Chargement...</p>
            </div>
          </div>
        </div>
      </div>
    `

    function handleLogin(event) {
      event.preventDefault()
      const email = document.getElementById('email').value
      const password = document.getElementById('password').value
      login(email, password)
    }

    function render() {
      const root = document.getElementById('root')
      if (token) {
        root.innerHTML = dashboardPage
        setTimeout(() => {
          loadStats()
          loadUsers()
        }, 100)
      } else {
        root.innerHTML = loginPage
      }
    }

    render()
  </script>
</body>
</html>
